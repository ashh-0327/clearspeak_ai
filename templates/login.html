<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — ClearSpeak AI</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a href="/" class="navbar-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        ClearSpeak AI
    </a>
    <div class="navbar-actions">
        <a href="/">Home</a>
        <a href="#" class="btn btn-primary" onclick="window.location.href='/dashboard'">Get Started</a>
    </div>
</nav>

<div class="login-wrapper">
    <div class="login-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your ClearSpeak AI account</p>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn btn-primary btn-lg" style="margin-top:8px" onclick="window.location.href='/dashboard'">Sign In</button>

        <div class="login-divider">or</div>

        <button class="btn btn-secondary btn-lg" onclick="window.location.href='/dashboard'">Continue as Guest</button>
    </div>
</div>

</body>
</html>
